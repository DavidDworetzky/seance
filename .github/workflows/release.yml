name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to apply
        required: true
        default: minor
        type: choice
        options:
          - patch
          - minor
          - major

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: seance

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Bump version and publish release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Bump crate version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          current="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          IFS=. read -r major minor patch <<EOF
          ${current}
          EOF

          case "${BUMP}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: ${BUMP}" >&2
              exit 1
              ;;
          esac

          version="${major}.${minor}.${patch}"
          VERSION="${version}" perl -0pi -e 's/(\[package\]\s.*?^version\s*=\s*")[^"]+(")/$1$ENV{VERSION}$2/ms' Cargo.toml

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Update lockfile
        run: cargo check

      - name: Validate release candidate
        run: |
          cargo fmt --check
          cargo clippy --all-targets --locked
          cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release binary
        run: |
          mkdir -p dist
          cp "target/release/${BIN_NAME}" "dist/${BIN_NAME}-macos"
          chmod +x "dist/${BIN_NAME}-macos"
          tar -czf "dist/${BIN_NAME}-${{ steps.version.outputs.tag }}-macos.tar.gz" -C dist "${BIN_NAME}-macos"

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "Release ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: dist/${{ env.BIN_NAME }}-${{ steps.version.outputs.tag }}-macos.tar.gz
